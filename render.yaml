services:
  - type: web
    name: trusted-midman
    runtime: php
    buildCommand: ""
    startCommand: php -S 0.0.0.0:$PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trusted-midman-db
          property: connectionString

databases:
  - name: trusted-midman-db
    plan: free