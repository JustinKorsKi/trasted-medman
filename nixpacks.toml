[phases.setup]
nixPkgs = ["php82", "php82Extensions.mysqli", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.openssl", "php82Extensions.curl"]

[phases.build]
cmds = [
  "php -r \"echo extension_loaded('mysqli') ? 'mysqli OK' : 'mysqli MISSING'; echo PHP_EOL;\""
]

[start]
cmd = "php -d extension=mysqli -d extension=pdo_mysql -S 0.0.0.0:$PORT -t ."
